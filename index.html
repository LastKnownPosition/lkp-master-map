<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Last Known Position &mdash; Master Map</title>
<style>
  :root{
    --ocean-1:#0c1824; --ocean-2:#0a131c; --land:#233544;
    --coast:#3f5568; --grat:rgba(120,150,175,.10);
    --ink:#eaf1f6; --muted:#93a7b6; --faint:#63788a; --accent:#df5540;
    --panel:#0f1d29; --panel-line:#22384a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--ocean-2);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden}
  #app{position:fixed;inset:0;overflow:hidden;touch-action:none}
  svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  #map{background:
    radial-gradient(120% 120% at 50% 18%, #10202f 0%, var(--ocean-1) 42%, var(--ocean-2) 100%);}
  #pins{pointer-events:none}
  #pins .dot{pointer-events:auto;cursor:pointer}
  .land{fill:var(--land);stroke:var(--coast);stroke-width:0.9;
    stroke-linejoin:round;vector-effect:non-scaling-stroke}
  .grat{stroke:var(--grat);
    stroke-width:1;fill:none;vector-effect:non-scaling-stroke}
  .track{fill:none;stroke:var(--accent);stroke-width:2.2;stroke-linecap:round;
    stroke-linejoin:round;opacity:.9;
    filter:drop-shadow(0 0 5px rgba(223,87,64,.6))}
  .track-node{fill:var(--accent);opacity:.85}
  .ping-ring{fill:none;stroke:var(--accent);stroke-width:1.6;
    transform-box:fill-box;transform-origin:center;
    animation:ping 2.6s ease-out infinite}
  .ping-ring.b{animation-delay:1.3s}
  @keyframes ping{0%{opacity:.9;r:6px}70%{opacity:0}100%{opacity:0;r:34px}}
  .ping-x{stroke:var(--accent);stroke-width:2.4;
    filter:drop-shadow(0 0 6px rgba(223,87,64,.9))}

  /* floating chrome */
  .card{position:absolute;background:rgba(12,22,32,.82);
    backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
    border:1px solid var(--panel-line);border-radius:12px}
  #titlecard{top:18px;left:18px;padding:14px 18px 13px;max-width:min(360px,72vw)}
  #titlecard .kick{font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--accent);font-weight:700}
  #titlecard h1{margin:5px 0 3px;font-size:19px;line-height:1.15;font-weight:650;
    letter-spacing:.01em}
  #titlecard p{margin:0;font-size:13px;color:var(--muted);line-height:1.35}
  #titlecard .count{margin-top:8px;font-size:12px;color:var(--faint)}
  #titlecard .count b{color:var(--ink)}

  #legend{left:18px;bottom:18px;padding:11px 13px 12px}
  #legend .lh{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--faint);margin-bottom:8px}
  .leg{display:flex;align-items:center;gap:9px;padding:5px 7px;border-radius:7px;
    cursor:pointer;user-select:none;transition:background .12s,opacity .12s}
  .leg:hover{background:rgba(255,255,255,.05)}
  .leg.off{opacity:.38}
  .leg .sw{width:12px;height:12px;border-radius:50%;flex:0 0 auto;
    box-shadow:0 0 0 1px rgba(0,0,0,.55),0 0 8px currentColor}
  .leg .nm{font-size:13px;color:var(--ink)}
  .leg .ct{margin-left:auto;font-size:12px;color:var(--faint);
    font-variant-numeric:tabular-nums}

  #controls{position:absolute;right:18px;top:18px;z-index:31;
    display:flex;flex-direction:column;gap:7px;
    transition:right .34s cubic-bezier(.4,0,.2,1)}
  #app.panelopen #controls{right:398px}
  .btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;
    background:rgba(12,22,32,.82);border:1px solid var(--panel-line);
    border-radius:10px;color:var(--ink);cursor:pointer;font-size:18px;
    backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
    transition:background .12s}
  .btn:hover{background:rgba(30,48,64,.92)}
  .btn.wide{width:auto;height:34px;padding:0 12px;font-size:12px;
    letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}

  #hint{position:absolute;z-index:15;left:50%;bottom:16px;transform:translateX(-50%);
    background:rgba(12,22,32,.7);border:1px solid var(--panel-line);
    border-radius:20px;padding:6px 15px;font-size:12px;color:var(--muted);
    pointer-events:none;transition:opacity .5s;white-space:nowrap}

  /* hover tooltip */
  #tip{position:absolute;z-index:20;width:236px;pointer-events:none;opacity:0;
    transform:translateY(4px);transition:opacity .12s,transform .12s;
    background:rgba(10,19,28,.96);border:1px solid var(--panel-line);
    border-radius:11px;overflow:hidden;box-shadow:0 12px 34px rgba(0,0,0,.5)}
  #tip.on{opacity:1;transform:translateY(0)}
  #tip .ph{width:100%;height:118px;background:#0a141d center/cover no-repeat;
    display:block}
  #tip .ph.empty{display:flex;align-items:center;justify-content:center;
    color:var(--faint);font-size:12px;letter-spacing:.06em}
  #tip .bd{padding:10px 12px 11px}
  #tip .nm{font-size:14px;font-weight:650;letter-spacing:.02em;line-height:1.2}
  #tip .row{display:flex;align-items:center;gap:7px;margin-top:6px}
  #tip .cat{font-size:11px;color:var(--muted)}
  #tip .cat .d{display:inline-block;width:8px;height:8px;border-radius:50%;
    margin-right:5px;vertical-align:middle;box-shadow:0 0 6px currentColor}
  #tip .coord{margin-top:7px;font-size:12px;color:var(--muted);
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  #tip .more{margin-top:8px;font-size:11px;color:var(--accent);
    letter-spacing:.05em;text-transform:uppercase}

  /* detail panel */
  #detail{position:absolute;top:0;right:0;height:100%;width:380px;max-width:88vw;
    background:linear-gradient(180deg,var(--panel),#0b1721);
    border-left:1px solid var(--panel-line);z-index:30;
    transform:translateX(102%);transition:transform .34s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;box-shadow:-18px 0 44px rgba(0,0,0,.44)}
  #detail.on{transform:none}
  #detail .hero{width:100%;height:210px;background:#0a141d center/cover no-repeat;
    flex:0 0 auto;position:relative}
  #detail .hero.empty{display:flex;align-items:center;justify-content:center;
    color:var(--faint);font-size:13px;letter-spacing:.08em}
  #detail .hero::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(11,23,33,0) 45%,rgba(11,23,33,.92))}
  #detail .x{position:absolute;top:12px;right:12px;z-index:2;width:32px;height:32px;
    border-radius:50%;border:none;background:rgba(6,12,18,.6);color:#fff;
    font-size:17px;cursor:pointer;line-height:1}
  #detail .x:hover{background:rgba(6,12,18,.9)}
  #detail .body{padding:17px 20px 22px;overflow-y:auto}
  #detail .code{font-size:11px;letter-spacing:.2em;color:var(--accent);
    font-weight:700;text-transform:uppercase}
  #detail h2{margin:6px 0 2px;font-size:21px;line-height:1.14;letter-spacing:.01em}
  #detail .sub{font-size:12px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--faint);margin-top:5px}
  #detail .chips{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 4px}
  #detail .chip{font-size:11.5px;padding:5px 10px;border-radius:20px;
    border:1px solid var(--panel-line);color:var(--muted);display:flex;
    align-items:center;gap:6px}
  #detail .chip .d{width:9px;height:9px;border-radius:50%;box-shadow:0 0 6px currentColor}
  #detail .desc{margin-top:15px;font-size:14px;line-height:1.5;color:#d3dee6}
  #detail .kv{margin-top:16px;border-top:1px solid var(--panel-line);padding-top:13px}
  #detail .kv .r{display:flex;justify-content:space-between;gap:14px;
    padding:5px 0;font-size:13px}
  #detail .kv .r.stack{flex-direction:column;align-items:flex-start;gap:3px}
  #detail .kv .k{color:var(--faint);white-space:nowrap}
  #detail .kv .v{color:var(--ink);text-align:right;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  #detail .kv .r.stack .v{text-align:left;font-size:12.5px;line-height:1.4}
  #detail .watch{display:flex;align-items:center;justify-content:center;gap:9px;
    margin-top:20px;padding:13px;border-radius:11px;text-decoration:none;
    background:var(--accent);color:#150806;font-weight:700;font-size:14px;
    letter-spacing:.02em;transition:filter .12s}
  #detail .watch:hover{filter:brightness(1.08)}
  #detail .watch.ghost{background:transparent;border:1px solid var(--panel-line);
    color:var(--muted);font-weight:600;margin-top:10px}
  #detail .note{margin-top:12px;font-size:11.5px;color:var(--faint);line-height:1.45}

  @media (max-width:640px){
    #titlecard{max-width:none;left:12px;right:76px;top:12px;padding:11px 13px}
    #titlecard h1{font-size:16px}
    #controls{right:12px;top:12px}
    #app.panelopen #controls{right:12px}
    #legend{left:12px;right:12px;bottom:12px;display:flex;flex-wrap:wrap;
      gap:2px 6px;padding:9px 11px}
    #legend .lh{width:100%}
    .leg .ct{display:none}
    #detail{width:100%;max-width:100%;top:auto;bottom:0;height:80vh;
      border-left:none;border-top:1px solid var(--panel-line);
      border-radius:16px 16px 0 0;transform:translateY(102%)}
    #detail.on{transform:none}
    #hint{display:none}
  }
</style>
</head>
<body>
<div id="app">
  <svg id="map"><g id="scene"></g></svg>
  <svg id="pins"></svg>

  <div id="titlecard" class="card">
    <div class="kick">Last Known Position</div>
    <h1>Master Map of the Wrecks</h1>
    <p>Every ship in the catalogue, plotted where she now lies.</p>
    <div class="count"><b id="ct">0</b> sites &middot; hover a marker, click to dive in</div>
  </div>

  <div id="controls">
    <div class="btn" id="zin" title="Zoom in">+</div>
    <div class="btn" id="zout" title="Zoom out">&minus;</div>
    <div class="btn wide" id="fit" title="Frame all wrecks">Wrecks</div>
    <div class="btn wide" id="world" title="Whole world">World</div>
  </div>

  <div id="legend" class="card">
    <div class="lh">Vessel type &mdash; click to filter</div>
    <div id="legrows"></div>
  </div>

  <div id="hint">Scroll to zoom &middot; drag to pan &middot; click a marker for the full case</div>

  <div id="tip">
    <div class="ph"></div>
    <div class="bd">
      <div class="nm"></div>
      <div class="row"><span class="cat"></span></div>
      <div class="coord"></div>
      <div class="more">Click for the full case &rsaquo;</div>
    </div>
  </div>

  <div id="detail">
    <div class="hero"><button class="x" id="dx">&times;</button></div>
    <div class="body"></div>
  </div>
</div>

const META = {"count":15,"categories":[{"key":"passenger","label":"Passenger & Liner","color":"#dda63c","n":3},{"key":"cargo","label":"Cargo & Working","color":"#3f93ec","n":5},{"key":"naval","label":"Naval & Military","color":"#df5540","n":4},{"key":"sail","label":"Age of Sail & Treasure","color":"#9a7fe2","n":1},{"key":"offshore","label":"Offshore & Industrial","color":"#2bb277","n":2}],"channel":"https://www.youtube.com/@LastKnownPositionDocumentary"};
const CATCOLOR = {}; META.categories.forEach(c=>CATCOLOR[c.key]=c.color);

// ---- equirectangular projection into a 1000x500 world plane ----
const W0=1000, H0=500;
const wx = lon => (lon+180)/360*W0;
const wy = lat => (90-lat)/180*H0;

const app=document.getElementById('app');
const mapSvg=document.getElementById('map');
const scene=document.getElementById('scene');
const pins=document.getElementById('pins');
const SVGNS='http://www.w3.org/2000/svg';
let CW=app.clientWidth, CH=app.clientHeight;

// ---- build static geography (land + graticule) in world coords ----
function buildGeography(){
  const frag=document.createDocumentFragment();
  // graticule every 30deg
  for(let lon=-150;lon<=150;lon+=30){
    const p=document.createElementNS(SVGNS,'path');
    p.setAttribute('class','grat');
    p.setAttribute('d',`M${wx(lon)},${wy(85)} L${wx(lon)},${wy(-85)}`);
    frag.appendChild(p);
  }
  for(let lat=-60;lat<=60;lat+=30){
    const p=document.createElementNS(SVGNS,'path');
    p.setAttribute('class','grat');
    p.setAttribute('d',`M${wx(-180)},${wy(lat)} L${wx(180)},${wy(lat)}`);
    frag.appendChild(p);
  }
  // land
  let d='';
  for(const f of WORLD.features){
    for(const poly of f.geometry.coordinates){
      for(const ring of poly){
        d+='M';
        for(const pt of ring){ d+=wx(pt[0]).toFixed(1)+','+wy(pt[1]).toFixed(1)+'L'; }
        d=d.slice(0,-1)+'Z';
      }
    }
  }
  const land=document.createElementNS(SVGNS,'path');
  land.setAttribute('class','land'); land.setAttribute('d',d);
  frag.appendChild(land);
  scene.appendChild(frag);
}
buildGeography();

// ---- view transform ----
let k=0.25, tx=0, ty=0, viewInsetR=0; // viewInsetR: keep the focus clear of the open panel
let userInteracted=false; // once true, resizes preserve the user's view instead of re-fitting
const clampK = v => Math.max(CW/W0*0.82, Math.min(70, v));
function apply(){
  scene.setAttribute('transform',`translate(${tx},${ty}) scale(${k})`);
  drawPins();
}
function sx(lon){ return wx(lon)*k+tx; }
function sy(lat){ return wy(lat)*k+ty; }

function fitBox(lonmin,latmin,lonmax,latmax,pad=0.14,animate=false){
  if(!CW||!CH){ CW=app.clientWidth||window.innerWidth; CH=app.clientHeight||window.innerHeight; }
  const x0=wx(lonmin), x1=wx(lonmax), y0=wy(latmax), y1=wy(latmin);
  const bw=Math.max(x1-x0,1), bh=Math.max(y1-y0,1);
  let nk=clampK(Math.min(CW/(bw*(1+pad*2)), CH/(bh*(1+pad*2))));
  const cx=(x0+x1)/2, cy=(y0+y1)/2;
  const nx=(CW-viewInsetR)/2-nk*cx, ny=CH/2-nk*cy;
  if(animate) animateTo(nk,nx,ny); else {k=nk;tx=nx;ty=ny;apply();}
}
function dataBox(){
  let a=180,b=90,c=-180,d=-90, any=false;
  for(const e of EPISODES){ if(hidden.has(e.category))continue; any=true;
    a=Math.min(a,e.lon); c=Math.max(c,e.lon);
    b=Math.min(b,e.lat); d=Math.max(d,e.lat); }
  if(!any) return [-90,0,40,60];
  return [a,b,c,d];
}
function fitData(animate){ const [a,b,c,d]=dataBox(); fitBox(a,b,c,d,0.16,animate); }
function fitWorld(animate){ fitBox(-168,-56,192,80,0.02,animate); }

// ---- animate transform (fly-to) ----
let raf=null;
function animateTo(nk,nx,ny,ms=680){
  const k0=k,x0=tx,y0=ty, t0=performance.now();
  const ease=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
  if(raf)cancelAnimationFrame(raf);
  (function step(now){
    let t=Math.min(1,(now-t0)/ms); const e=ease(t);
    k=k0+(nk-k0)*e; tx=x0+(nx-x0)*e; ty=y0+(ny-y0)*e; apply();
    if(t<1) raf=requestAnimationFrame(step);
  })(performance.now());
}

// ---- pins (dots + selected track/ping), redrawn each frame ----
const hidden=new Set();
let selected=null;
function drawPins(){
  let s='';
  // selected track + ping (under dots)
  if(selected){
    const e=selected;
    if(e.track && e.track.length>1){
      let pts=e.track.map(p=>sx(p[0]).toFixed(1)+','+sy(p[1]).toFixed(1)).join(' ');
      s+=`<polyline class="track" points="${pts}"/>`;
      for(let i=0;i<e.track.length-1;i++)
        s+=`<circle class="track-node" cx="${sx(e.track[i][0]).toFixed(1)}" cy="${sy(e.track[i][1]).toFixed(1)}" r="2.2"/>`;
    }
    const px=sx(e.lon), py=sy(e.lat);
    s+=`<circle class="ping-ring" cx="${px}" cy="${py}" r="6"/>`;
    s+=`<circle class="ping-ring b" cx="${px}" cy="${py}" r="6"/>`;
    s+=`<path class="ping-x" d="M${px-6},${py-6}L${px+6},${py+6}M${px+6},${py-6}L${px-6},${py+6}"/>`;
  }
  for(const e of EPISODES){
    if(hidden.has(e.category)) continue;
    const px=sx(e.lon), py=sy(e.lat);
    if(px<-30||px>CW+30||py<-30||py>CH+30) continue; // cull off-screen
    const col=CATCOLOR[e.category];
    const sel=selected&&selected.code===e.code;
    const r=sel?8.5:6.2;
    s+=`<g class="dot" data-code="${e.code}">`
      +`<circle cx="${px}" cy="${py}" r="${r+3}" fill="#06101a" opacity="${sel?0:.55}"/>`
      +`<circle cx="${px}" cy="${py}" r="${r}" fill="${col}" stroke="#06101a" stroke-width="1.6" `
      +`style="filter:drop-shadow(0 0 ${sel?9:5}px ${col})"/>`
      +`</g>`;
  }
  pins.innerHTML=s;
}

// ---- interaction: zoom / pan ----
mapSvg.addEventListener('wheel',ev=>{
  ev.preventDefault();
  userInteracted=true;
  const f=Math.pow(1.0016,-ev.deltaY);
  const nk=clampK(k*f);
  const mx=ev.clientX, my=ev.clientY;
  tx=mx-(mx-tx)*(nk/k); ty=my-(my-ty)*(nk/k); k=nk; apply();
},{passive:false});

// Capture the pointer ONLY once a real drag starts, so a plain click still
// reaches the dot (capturing on pointerdown would eat every marker click).
let drag=null, dragging=false, suppressClick=false;
app.addEventListener('pointerdown',ev=>{
  if(ev.target.closest('#detail')||ev.target.closest('.card')||ev.target.closest('#controls'))return;
  drag={x:ev.clientX,y:ev.clientY,tx,ty,id:ev.pointerId}; dragging=false;
});
app.addEventListener('pointermove',ev=>{
  if(drag){
    const dx=ev.clientX-drag.x, dy=ev.clientY-drag.y;
    if(!dragging && Math.abs(dx)+Math.abs(dy)>4){
      dragging=true; userInteracted=true; hideTip();
      try{ app.setPointerCapture(drag.id); }catch(e){}
      app.style.cursor='grabbing';
    }
    if(dragging){ tx=drag.tx+dx; ty=drag.ty+dy; apply(); }
  } else {
    const g=ev.target.closest && ev.target.closest('.dot');
    if(g) hoverDot(g.getAttribute('data-code'),ev);
  }
});
app.addEventListener('pointerup',ev=>{
  app.style.cursor='';
  if(drag){
    if(dragging){ suppressClick=true; try{ app.releasePointerCapture(drag.id); }catch(e){} }
    drag=null; dragging=false;
  }
});
// hover + click come through the pins overlay (only .dot is hit-testable there)
pins.addEventListener('pointermove',ev=>{
  if(dragging)return;
  const g=ev.target.closest('.dot'); if(g) hoverDot(g.getAttribute('data-code'),ev);
});
pins.addEventListener('pointerleave',()=>{ if(!tipPinned) hideTip(); });
pins.addEventListener('click',ev=>{
  if(suppressClick){ suppressClick=false; return; }
  const g=ev.target.closest('.dot'); if(g) selectDot(g.getAttribute('data-code'));
});
// click on empty ocean dismisses the hover card
mapSvg.addEventListener('click',()=>{ if(!tipPinned) hideTip(); });

// ---- tooltip ----
const tip=document.getElementById('tip');
let tipPinned=false, tipCode=null;
function hoverDot(code,ev){
  if(code===tipCode && tip.classList.contains('on')){ positionTip(ev); return; }
  const e=EPISODES.find(x=>x.code===code); if(!e)return;
  tipCode=code;
  const ph=tip.querySelector('.ph');
  if(e.img){ ph.style.backgroundImage=`url(${e.img})`; ph.classList.remove('empty'); ph.textContent=''; }
  else{ ph.style.backgroundImage='none'; ph.classList.add('empty'); ph.textContent='NO PERIOD PHOTOGRAPH'; }
  tip.querySelector('.nm').textContent=e.name;
  tip.querySelector('.cat').innerHTML=
    `<span class="d" style="color:${CATCOLOR[e.category]}"></span>${e.catLabel} &middot; ${e.status}`;
  tip.querySelector('.coord').textContent=e.coord;
  tip.classList.add('on');
  positionTip(ev);
}
function positionTip(ev){
  const w=236, pad=14, hgt=tip.offsetHeight||210;
  let x=ev.clientX+16, y=ev.clientY-hgt/2;
  if(x+w+pad>CW) x=ev.clientX-w-16;
  y=Math.max(pad,Math.min(CH-hgt-pad,y));
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
function hideTip(){ tip.classList.remove('on'); tipCode=null; }

// ---- detail panel ----
const detail=document.getElementById('detail');
function selectDot(code){
  const e=EPISODES.find(x=>x.code===code); if(!e)return;
  selected=e; hideTip(); userInteracted=true;
  viewInsetR = window.innerWidth>640 ? 380 : 0; // panel is a right drawer on desktop
  app.classList.add('panelopen');
  if(e.bbox) fitBox(e.bbox.lonmin,e.bbox.latmin,e.bbox.lonmax,e.bbox.latmax,0.28,true);
  else animateTo(clampK(6.5), (CW-viewInsetR)/2-6.5*wx(e.lon), CH*0.46-6.5*wy(e.lat));
  const hero=detail.querySelector('.hero');
  if(e.img){ hero.style.backgroundImage=`url(${e.img})`; hero.classList.remove('empty'); }
  else{ hero.style.backgroundImage='none'; hero.classList.add('empty'); hero.textContent=''; }
  hero.innerHTML='<button class="x" id="dx">&times;</button>'+
    (e.img?'':'<span style="color:var(--faint);letter-spacing:.08em">NO PERIOD PHOTOGRAPH</span>');
  detail.querySelector('#dx').onclick=closeDetail;
  const col=CATCOLOR[e.category];
  const sub=e.subtitle?`<div class="sub">${e.subtitle}</div>`:'';
  const last=e.lastLabel?`<div class="r stack"><span class="k">Reported position</span><span class="v">${e.lastLabel}</span></div>`:'';
  detail.querySelector('.body').innerHTML=
    `<div class="code">${e.code}</div>`
    +`<h2>${e.name}</h2>${sub}`
    +`<div class="chips">`
      +`<span class="chip"><span class="d" style="color:${col};background:${col}"></span>${e.catLabel}</span>`
      +`<span class="chip">${e.status}</span>`
    +`</div>`
    +(e.summary?`<div class="desc">${e.summary}</div>`:'')
    +`<div class="kv">`
      +`<div class="r"><span class="k">Wreck coordinates</span><span class="v">${e.coord}</span></div>`
      +last
    +`</div>`
    +`<a class="watch" href="${e.watch}" target="_blank" rel="noopener">&#9654; Watch on the channel</a>`
    +`<a class="watch ghost" href="${META.channel}" target="_blank" rel="noopener">Last Known Position on YouTube</a>`
    +`<div class="note">Opens the channel filtered to this ship. Once the episode is live, its exact link can be pinned in links.yaml.</div>`;
  detail.classList.add('on');
  drawPins();
}
function closeDetail(){ detail.classList.remove('on'); app.classList.remove('panelopen');
  viewInsetR=0; selected=null; drawPins(); }
document.getElementById('dx').onclick=closeDetail;

// ---- legend ----
const legrows=document.getElementById('legrows');
META.categories.forEach(c=>{
  const row=document.createElement('div');
  row.className='leg'; row.dataset.key=c.key;
  row.innerHTML=`<span class="sw" style="color:${c.color};background:${c.color}"></span>`
    +`<span class="nm">${c.label}</span><span class="ct">${c.n}</span>`;
  row.onclick=()=>{
    if(hidden.has(c.key)){hidden.delete(c.key);row.classList.remove('off');}
    else{hidden.add(c.key);row.classList.add('off');}
    if(selected&&hidden.has(selected.category))closeDetail();
    drawPins();
  };
  legrows.appendChild(row);
});

// ---- controls ----
function zoomBy(f){ userInteracted=true; const nk=clampK(k*f);
  tx=CW/2-(CW/2-tx)*(nk/k); ty=CH/2-(CH/2-ty)*(nk/k); k=nk; apply(); }
document.getElementById('zin').onclick=()=>zoomBy(1.5);
document.getElementById('zout').onclick=()=>zoomBy(1/1.5);
document.getElementById('fit').onclick=()=>{ userInteracted=true; closeDetail(); fitData(true); };
document.getElementById('world').onclick=()=>{ userInteracted=true; closeDetail(); fitWorld(true); };
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDetail(); });

// ---- boot ----
// Fit the moment #app actually has a size. A plain load/rAF boot can run
// before layout gives the page its dimensions (slow parse of the inline data
// over a network), leaving the map at scale 0; a ResizeObserver can't miss it.
document.getElementById('ct').textContent=META.count;
// Keep the map framed to the data on every resize UNTIL the user takes over
// (pan / zoom / select). This survives the viewport changing size after load
// — a plain one-shot fit can lock onto a mid-layout size and mis-frame.
function refresh(){
  CW=app.clientWidth||window.innerWidth||1280;
  CH=app.clientHeight||window.innerHeight||720;
  if(!userInteracted){ fitData(false); } else { apply(); }
}
if(window.ResizeObserver){ new ResizeObserver(refresh).observe(app); }
window.addEventListener('resize',refresh);
window.addEventListener('load',refresh);
requestAnimationFrame(refresh);
setTimeout(()=>{ const h=document.getElementById('hint'); if(h)h.style.opacity='0'; },7000);
</script>
</body>
